<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test — Valorant Color Reaction Test</title>
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/test.css">
</head>
<body>

  <div id="progress-bar-track">
    <div id="progress-bar"></div>
  </div>

  <div id="hud">
    <div id="trial-counter">30 Trials</div>
  </div>

  <div id="test-area">
    <svg id="target" viewBox="0 0 70 110" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="35" cy="10" r="9"  stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
      <line x1="35" y1="19" x2="35" y2="30" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
      <line x1="2"  y1="30" x2="68" y2="30" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
      <line x1="35" y1="30" x2="35" y2="68" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
      <line x1="35" y1="68" x2="20" y2="106" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
      <line x1="35" y1="68" x2="50" y2="106" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
    </svg>
  </div>

  <button id="reset-btn" title="Reset test">↺ Reset</button>

  <div id="feedback-flash" aria-live="polite"></div>

  <div id="status-msg">Click anywhere to begin</div>

  <script src="../assets/js/test-engine.js"></script>
</body>
</html>
