<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Results — Valorant Color Reaction Test</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/test.css">
  <!-- Chart.js from CDN — no build step required -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <main class="results-page">
    <h1>Your <span style="color: var(--accent-red)">Results</span></h1>
    <p class="subtitle">Reaction time by highlight color (ms) — lower is better</p>

    <!-- Winner callout; border-color and text filled by results.js -->
    <div id="winner-banner">
      <h2>Best Color for You</h2>
      <div id="winner-ms">—</div>
      <div id="winner-name">—</div>
    </div>

    <!-- Per-color stats; tbody rows generated by results.js -->
    <table id="stats-table">
      <thead>
        <tr>
          <th>Color</th>
          <th>Mean (ms)</th>
          <th>Median (ms)</th>
          <th>Std Dev</th>
          <th>Trials</th>
        </tr>
      </thead>
      <tbody id="stats-body"></tbody>
    </table>

    <!-- Bar chart rendered by Chart.js -->
    <div id="chart-container">
      <h3>Median Reaction Time by Color</h3>
      <canvas id="rt-chart" height="180"></canvas>
    </div>

    <div class="results-actions">
      <a class="btn btn-primary" href="test.html">Retest</a>
      <a class="btn btn-secondary" href="index.html">Home</a>
    </div>
  </main>

  <script src="js/results.js"></script>
</body>
</html>
